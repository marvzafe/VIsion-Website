<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exploded View with Zoom & Description</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 40px; /* space between description and object */
      align-items: center;
    }

    .object {
      position: relative;
      width: 150px;
      height: 150px;
      background: #3498db;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .part {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #e74c3c;
      border-radius: 8px;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 12px;
      display: none; /* default hidden */
      transition: transform 0.4s ease, opacity 0.4s ease;
      opacity: 0;
      cursor: pointer;
    }

    /* kapag exploded ang object, ipakita lahat ng parts */
    .object.exploded .part {
      display: flex;
      opacity: 1;
    }

    .part.zoom {
      transform: scale(2); /* zoom in only the clicked part */
      z-index: 10;
    }

    /* Positions for exploded view */
    .part1 { top: -80px; left: 40px; }
    .part2 { top: 40px; left: -80px; }
    .part3 { top: 40px; left: 170px; }
    .part4 { top: 170px; left: 40px; }

    /* Description panel */
    .description {
      width: 250px;
      min-height: 150px;
      background: #fff;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: none;
    }

    .description.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Description on the left -->
    <div class="description" id="descriptionBox"></div>

    <!-- Object on the right -->
    <div class="object" id="object">
      <div class="part part1" data-detail="This is detail for Part A">A</div>
      <div class="part part2" data-detail="This is detail for Part B">B</div>
      <div class="part part3" data-detail="This is detail for Part C">C</div>
      <div class="part part4" data-detail="This is detail for Part D">D</div>
    </div>
  </div>

  <script>
    const object = document.getElementById('object');
    const parts = document.querySelectorAll('.part');
    const descriptionBox = document.getElementById('descriptionBox');

    // Step 1: Toggle exploded view (show/hide parts)
    object.addEventListener('click', () => {
      object.classList.toggle('exploded');

      // kapag nag-collapse, siguraduhin na reset lahat
      if (!object.classList.contains('exploded')) {
        parts.forEach(p => {
          p.classList.remove('zoom');
          p.style.display = "none";
        });
        descriptionBox.classList.remove('show');
        descriptionBox.textContent = "";
      }
    });

    // Step 2 & 3: Zoom in/out + show/hide description
    parts.forEach(part => {
      part.addEventListener('click', (e) => {
        const clickedPart = e.target;
        const isZoomed = clickedPart.classList.contains('zoom');

        if (!isZoomed) {
          // Hide other parts
          parts.forEach(p => {
            if (p !== clickedPart) p.style.display = "none";
          });

          // Zoom in clicked part only
          clickedPart.classList.add('zoom');

          // Show description
          descriptionBox.textContent = clickedPart.getAttribute('data-detail');
          descriptionBox.classList.add('show');
        } else {
          // Reset: show all parts again
          parts.forEach(p => p.style.display = "flex");
          clickedPart.classList.remove('zoom');

          // Hide description
          descriptionBox.classList.remove('show');
          descriptionBox.textContent = "";
        }
      });
    });
  </script>
</body>
</html>
